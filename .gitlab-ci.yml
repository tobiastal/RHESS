image: node:20

stages:
  - build

# GitLab Pages requires the job to be named "pages" and artifacts at ./public
pages:
  stage: build
  script:
    # Install frontend dependencies
    - npm ci

    # Generate static mock API JSON files into public/static-api/
    # (Vite will copy public/ into the dist output automatically)
    - node scripts/generate-static-api.js

    # Build the Vite frontend
    #   VITE_BASE_PATH  → /<project-name>/ so all asset paths are correct
    #   VITE_STATIC_DEMO → switches API client to use static JSON files
    - VITE_BASE_PATH="/$CI_PROJECT_NAME/" VITE_STATIC_DEMO=true npm run build

    # Move Vite's dist/ output to public/ (GitLab Pages requirement)
    # The original public/ source folder was already copied into dist/ by Vite
    - rm -rf public
    - mv dist public

  artifacts:
    paths:
      - public
    expire_in: 30 days

  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
